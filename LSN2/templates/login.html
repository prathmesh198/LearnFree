<!DOCTYPE html>
<html lang="en" class="h-full bg-[#0f0f0f]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-full text-white">

<!-- Navbar -->
<header class="w-full bg-[#0f0f0f] px-8 py-4 flex justify-between shadow-md">
  <h1 class="text-xl font-bold"><a href="/">LearnFree</a></h1>
</header>

<!-- Container -->
<div class="h-[calc(100vh-80px)] flex items-center justify-center px-4">
  <div class="w-full max-w-md bg-[#1a1a1a] shadow-2xl rounded-2xl p-8">

    <!-- Messages -->
    {% if messages %}
      {% for message in messages %}
        <div class="mb-4 px-4 py-2 rounded-lg bg-red-500 text-white">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}

    <!-- Tabs -->
    <div class="flex mb-6">
      <button id="login-tab" class="flex-1 py-2 text-[#c9f56e] border-b-2 border-[#c9f56e]">Login</button>
      <button id="register-tab" class="flex-1 py-2 text-gray-400 border-b-2 border-transparent">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="login-form" method="POST" class="space-y-4">
      {% csrf_token %}

      <input type="text" name="username" placeholder="Username" required
        class="w-full px-4 py-2 rounded-lg bg-[#0f0f0f] border border-gray-700">

      <input type="password" name="password" placeholder="Password" required
        class="w-full px-4 py-2 rounded-lg bg-[#0f0f0f] border border-gray-700">

      <button type="submit" name="login"
        class="w-full bg-[#c9f56e] text-black py-2 rounded-lg hover:bg-lime-400">
        Login
      </button>
    </form>

    <!-- REGISTER FORM -->
    <form id="register-form" method="POST" class="space-y-4 hidden">
      {% csrf_token %}
      <input type="text" name="fullname" placeholder="First Name" required
        class="w-full px-4 py-2 rounded-lg bg-[#0f0f0f] border border-gray-700">

      <input type="text" name="username" placeholder="Username" required
        class="w-full px-4 py-2 rounded-lg bg-[#0f0f0f] border border-gray-700">

      <input type="email" name="email" placeholder="Email" required
        class="w-full px-4 py-2 rounded-lg bg-[#0f0f0f] border border-gray-700">

    

      <input type="password" name="password" placeholder="Confirm Password" required
        class="w-full px-4 py-2 rounded-lg bg-[#0f0f0f] border border-gray-700">

      <button type="submit" name="register"
        class="w-full bg-[#c9f56e] text-black py-2 rounded-lg hover:bg-lime-400">
        Register
      </button>
    </form>

  </div>
</div>

<!-- Script -->
<script>
  const loginTab = document.getElementById('login-tab');
  const registerTab = document.getElementById('register-tab');
  const loginForm = document.getElementById('login-form');
  const registerForm = document.getElementById('register-form');

  loginTab.addEventListener('click', () => {
    loginForm.classList.remove('hidden');
    registerForm.classList.add('hidden');

    loginTab.classList.add('text-[#c9f56e]', 'border-[#c9f56e]');
    registerTab.classList.remove('text-[#c9f56e]', 'border-[#c9f56e]');
  });

  registerTab.addEventListener('click', () => {
    registerForm.classList.remove('hidden');
    loginForm.classList.add('hidden');

    registerTab.classList.add('text-[#c9f56e]', 'border-[#c9f56e]');
    loginTab.classList.remove('text-[#c9f56e]', 'border-[#c9f56e]');
  });

  // Auto switch tabs on error
  {% if reg_form.errors %}
    registerTab.click();
  {% endif %}

  {% if login_form.errors %}
    loginTab.click();
  {% endif %}
</script>

</body>
</html>
